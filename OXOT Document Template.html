document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <span style=\"font-size:13px; font-weight:800; letter-spacing:3px; color:#14233B;\">OXOT<\u002Fspan>\n    <\u002Fspan>\n    <span style=\"font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:600; color:#8A8676;\">House Style &amp; Document Template<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===== RUNNING FOOTER ===== -->\n  <div slot=\"footer\" style=\"display:flex; justify-content:space-between; align-items:center; padding-top:7px; border-top:1px solid #DAD6CC; font-family:'Archivo',sans-serif; font-size:9.5px; letter-spacing:1.5px; text-transform:uppercase; color:#8A8676;\">\n    <span>OXOT · Editorial-institutional system<\u002Fspan>\n    <span>Template v1.0 · 2026<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===== TITLE BLOCK ===== -->\n  <div style=\"font-family:'Archivo',sans-serif; margin-top:6px;\">\n    <span style=\"font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:700; color:#FF7900;\">Document Template<\u002Fspan>\n    <h1 style=\"font-family:'Spectral',Georgia,serif; font-size:41px; line-height:1.02; font-weight:600; color:#14233B; margin:10px 0 8px; letter-spacing:-0.5px;\">The OXOT document system<\u002Fh1>\n    <p style=\"font-size:13.5px; line-height:1.58; color:#3C4757; margin:0; max-width:6.5in;\">A calm, authoritative baseline for every OXOT document — reports, briefs, one-pagers and regulatory primers. This sheet is both the house-style reference and the working template: duplicate it, keep the header, footer, grid and component vocabulary, and replace the body with your own content. Reproduce the values on these pages exactly so every document reads as one voice.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- meta row -->\n  <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; padding:13px 0; border-top:1px solid #E4E0D6; border-bottom:1px solid #E4E0D6; font-family:'Archivo',sans-serif;\">\n    <div>\n      <div style=\"font-size:9.5px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; color:#8A8676; margin-bottom:3px;\">Format<\u002Fdiv>\n      <div style=\"font-size:13px; font-weight:600; color:#14233B;\">US Letter · 8.5 × 11 in<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:9.5px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; color:#8A8676; margin-bottom:3px;\">Owner<\u002Fdiv>\n      <div style=\"font-size:13px; font-weight:600; color:#14233B;\">Brand &amp; Communications<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:9.5px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; color:#8A8676; margin-bottom:3px;\">Updated<\u002Fdiv>\n      <div style=\"font-size:13px; font-weight:600; color:#14233B;\">July 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== HOW TO USE ===== -->\n  <div style=\"margin-top:26px; font-family:'Archivo',sans-serif;\">\n    <span style=\"font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:700; color:#FF7900;\">01 · Anatomy<\u002Fspan>\n    <div style=\"font-family:'Spectral',Georgia,serif; font-size:21px; font-weight:600; color:#14233B; margin:5px 0 3px;\">How the page is built<\u002Fdiv>\n    <div style=\"height:2px; background:#FF7900; width:42px; margin-bottom:14px;\"><\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1.15fr 1fr; gap:16px; align-items:start;\">\n      <p style=\"font-size:13px; line-height:1.58; color:#3C4757; margin:0;\">Every OXOT page shares one frame: a <strong style=\"color:#14233B;\">running header<\u002Fstrong> carrying the wordmark and a 2px navy hairline; a <strong style=\"color:#14233B;\">running footer<\u002Fstrong> on a 1px taupe rule; and a <strong style=\"color:#14233B;\">0.72&nbsp;in printable margin<\u002Fstrong> on all sides. Content flows in a single measure and breaks naturally across sheets — the header and footer repeat on every printed page. Build the body from the component vocabulary on the following pages; never introduce a shape that isn’t defined here.<\u002Fp>\n      <div style=\"break-inside:avoid; background:#F5F8FC; border:1px solid #D7E1EF; border-radius:8px; padding:13px 16px;\">\n        <div style=\"font-size:10.5px; letter-spacing:1px; text-transform:uppercase; font-weight:700; color:#1E3A6E; margin-bottom:8px;\">Fixed regions<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:7px; font-size:12px; color:#3C4757; line-height:1.4;\">\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#FF7900; font-weight:800;\">→<\u002Fspan><span><strong style=\"color:#14233B;\">Header<\u002Fstrong> — wordmark + document label, navy hairline.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#FF7900; font-weight:800;\">→<\u002Fspan><span><strong style=\"color:#14233B;\">Title block<\u002Fstrong> — eyebrow, Spectral H1, standfirst, meta row.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#FF7900; font-weight:800;\">→<\u002Fspan><span><strong style=\"color:#14233B;\">Sections<\u002Fstrong> — numbered eyebrow, Spectral title, orange tick.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\"><span style=\"color:#FF7900; font-weight:800;\">→<\u002Fspan><span><strong style=\"color:#14233B;\">Footer<\u002Fstrong> — system line + version, taupe rule.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== COLOUR ===== -->\n  <div style=\"margin-top:28px; font-family:'Archivo',sans-serif;\">\n    <span style=\"font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:700; color:#FF7900;\">02 · Colour<\u002Fspan>\n    <div style=\"font-family:'Spectral',Georgia,serif; font-size:21px; font-weight:600; color:#14233B; margin:5px 0 3px;\">Palette<\u002Fdiv>\n    <div style=\"height:2px; background:#FF7900; width:42px; margin-bottom:14px;\"><\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:11px;\">\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:60px; border-radius:7px; background:#14233B;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Navy<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#14233B<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Primary text, dark panels<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:60px; border-radius:7px; background:#FF7900;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Dutch Orange<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#FF7900<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Single accent · rules, eyebrows<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:60px; border-radius:7px; background:#EEECE6; border:1px solid #DAD6CC;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Warm Paper<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#EEECE6<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Canvas / page field<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:60px; border-radius:7px; background:#FFFFFF; border:1px solid #DAD6CC;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">White<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#FFFFFF<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Cards / surfaces<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:60px; border-radius:7px; background:#3C4757;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Slate<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#3C4757<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Body copy<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:11px; margin-top:12px;\">\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:48px; border-radius:7px; background:#8A8676;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Taupe<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#8A8676<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Captions, meta<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:48px; border-radius:7px; background:#1E3A6E;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Steel Blue<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#1E3A6E<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Info-card headings<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:48px; border-radius:7px; background:#F5F8FC; border:1px solid #D7E1EF;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Ice Blue<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#F5F8FC<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Info-card fill · border #D7E1EF<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:48px; border-radius:7px; background:#FFF4E8; border:1px solid #FFD9AE;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Amber Tint<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#FFF4E8<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Alert strip · border #FFD9AE<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"break-inside:avoid;\">\n        <div style=\"height:48px; border-radius:7px; background:#C56A1E;\"><\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:700; color:#14233B; margin-top:6px;\">Burnt Orange<\u002Fdiv>\n        <div style=\"font-size:11px; color:#8A8676; font-variant-numeric:tabular-nums;\">#C56A1E<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8A8676; line-height:1.3; margin-top:2px;\">Text on amber tint<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:11.5px; line-height:1.5; color:#8A8676; margin:12px 0 0;\">One accent only. Orange signals — it never fills a large area. The two tint families (ice blue, amber) carry supporting and cautionary content respectively.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== TYPOGRAPHY ===== -->\n  <div style=\"margin-top:28px; font-family:'Archivo',sans-serif;\">\n    <span style=\"font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:700; color:#FF7900;\">03 · Type<\u002Fspan>\n    <div style=\"font-family:'Spectral',Georgia,serif; font-size:21px; font-weight:600; color:#14233B; margin:5px 0 3px;\">Typography<\u002Fdiv>\n    <div style=\"height:2px; background:#FF7900; width:42px; margin-bottom:14px;\"><\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n      <div style=\"b
